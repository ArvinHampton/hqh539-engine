[server]
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"
# Render sets PORT; Streamlit CLI still wins when --server.port is passed.
maxUploadSize = 25
# Larger websocket frames so file deposits + UI state don't trip proxy timeouts.
maxMessageSize = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
