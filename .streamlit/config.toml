[server]
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"
# Render sets PORT; Streamlit CLI still wins when --server.port is passed.
# Must stay in sync with HQH539_MAX_DEPOSIT_MB (default 2 GiB).
maxUploadSize = 2048
# Large enough for status messages; file bodies use multipart upload, not this alone.
maxMessageSize = 500

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
