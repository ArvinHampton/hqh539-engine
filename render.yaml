# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: HQH-539-512
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID_100
        sync: false
      - key: STRIPE_PRICE_ID_500
        sync: false
      - key: STRIPE_PRICE_ID_2000
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HQH539_DATA_DIR
        value: /tmp
      - key: MASTER_EMAILS
        value: bradley20136@gmail.com
      - key: HQH539_BYTES_PER_CREDIT
        value: "65536"

  - type: web
    name: HQH-539-512-webhook
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.webhook
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_100
        sync: false
      - key: STRIPE_PRICE_ID_500
        sync: false
      - key: STRIPE_PRICE_ID_2000
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HQH539_DATA_DIR
        value: /tmp
